<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>組長專屬日曆與工作紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch; 
            overflow-x: hidden;
            touch-action: pan-y;
        }

        ::-webkit-scrollbar { display: none; }
        
        .modal-enter { opacity: 0; transform: translateY(20px); }
        .modal-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-exit { opacity: 1; transform: translateY(0); }
        .modal-exit-active { opacity: 0; transform: translateY(20px); transition: all 0.2s ease-in; }

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* 列印專屬設定 */
        @media print {
            body { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                background-color: white !important;
            }
            @page { margin: 1cm; }
            /* 讓印出來的陰影與框線更清晰 */
            .shadow-sm { box-shadow: none !important; border-bottom: 1px solid #e2e8f0 !important; }
            .print-break-inside-avoid { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-[100dvh] flex flex-col text-slate-800">

    <!-- 專屬列印區塊 (平時隱藏，按下印表機時才會顯示並覆蓋全螢幕) -->
    <div id="print-area" class="hidden print:block w-full bg-white z-[99999] absolute top-0 left-0 p-4 sm:p-8 min-h-screen">
        <!-- 內容由 JS 動態填入 -->
    </div>

    <!-- 頂部導航列 (雙棲切換) -->
    <div class="sticky top-0 z-40 w-full shadow-sm flex flex-col shrink-0 print:hidden" id="top-nav-bar">
        <header class="bg-indigo-600 text-white border-b border-indigo-700">
            <div class="px-4 py-3 flex justify-between items-center relative">
                <div class="flex items-center gap-2">
                    <button id="nav-calendar" onclick="switchAppMode('calendar')" class="px-3 py-1.5 rounded-lg text-sm font-bold bg-white/20 shadow-sm transition-all flex items-center gap-1.5">
                        <i class="fa-solid fa-calendar-days"></i>工作行事曆
                    </button>
                    <button id="nav-schedule" onclick="switchAppMode('schedule')" class="px-3 py-1.5 rounded-lg text-sm font-bold text-indigo-100 hover:bg-white/10 transition-all flex items-center gap-1.5">
                        <i class="fa-solid fa-table-cells"></i>我的課表
                    </button>
                </div>
                
                <h1 class="text-base sm:text-lg font-bold absolute left-1/2 transform -translate-x-1/2 hidden sm:block">
                    專屬秘書系統
                </h1>

                <div class="w-20"></div> <!-- 平衡用 -->
            </div>
        </header>

        <!-- 行事曆專屬：日期控制列 -->
        <div id="calendar-header-controls" class="flex flex-col">
            <div class="bg-white border-b border-slate-200 px-3 sm:px-4 py-2.5 flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="flex items-center gap-2 sm:gap-4 w-full sm:w-auto justify-between sm:justify-start">
                    <div class="flex items-center gap-1 sm:gap-2">
                        <button onclick="changeDate(-1)" class="p-2 rounded-full hover:bg-slate-100 text-slate-500 transition-colors active:scale-95"><i class="fa-solid fa-chevron-left"></i></button>
                        
                        <!-- 加入隱形日期選擇器，包覆在文字上方 -->
                        <div class="relative cursor-pointer group flex items-center justify-center">
                            <h2 id="current-date-display" class="text-lg sm:text-xl font-bold text-slate-800 min-w-[130px] text-center group-hover:text-indigo-600 transition-colors" title="點擊選擇日期">2026年 8月</h2>
                            <input type="date" id="date-picker-input" onchange="jumpToDate(this.value)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer m-0 p-0 z-10">
                        </div>
                        
                        <button onclick="changeDate(1)" class="p-2 rounded-full hover:bg-slate-100 text-slate-500 transition-colors active:scale-95"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <!-- 改為房子與單月清單圖示 -->
                    <div class="flex items-center gap-1">
                        <button onclick="goToToday()" class="px-3 py-1.5 text-lg font-medium rounded-md text-indigo-600 hover:bg-indigo-50 transition-colors active:scale-95 flex items-center justify-center" title="回到今天">
                            <i class="fa-solid fa-house"></i>
                        </button>
                        <button id="month-list-btn-header" onclick="openMonthlyListModal()" class="px-3 py-1.5 text-lg font-medium rounded-md text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 transition-colors active:scale-95 flex items-center justify-center" title="單月清單">
                            <i class="fa-solid fa-list-ul"></i>
                        </button>
                    </div>
                </div>
                
                <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200 w-full justify-between sm:w-auto relative">
                    <button onclick="setView('day')" id="view-day" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors text-center">單日</button>
                    <button onclick="setView('week')" id="view-week" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors text-center">單週</button>
                    <button onclick="setView('month')" id="view-month" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md bg-white shadow-sm text-slate-700 transition-colors text-center">單月</button>
                    <button onclick="setView('year')" id="view-year" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors text-center">年度</button>
                </div>
            </div>
        </div>
        
        <!-- 課表專屬：多重課表切換列 -->
        <div id="schedule-header-controls" class="hidden flex-col">
            <div class="bg-white border-b border-slate-200 px-3 sm:px-4 py-2.5 flex justify-center items-center">
                <div class="relative inline-flex items-center bg-indigo-50 hover:bg-indigo-100 transition-colors rounded-lg px-4 py-2 cursor-pointer shadow-sm border border-indigo-100 w-full sm:w-auto max-w-[280px]">
                    <select id="schedule-selector" onchange="onScheduleSelectChange()" class="bg-transparent text-indigo-900 font-bold text-[15px] sm:text-base outline-none cursor-pointer appearance-none pr-7 relative z-10 w-full text-center">
                        <option value="my_weekly_schedule">🧑‍🏫 我的專屬課表</option>
                        <option value="office_weekly_schedule">🏢 學務處課表</option>
                        <option value="son_weekly_schedule">👦 兒子課表</option>
                    </select>
                    <i class="fa-solid fa-chevron-down text-indigo-500 absolute right-4 text-sm pointer-events-none z-0"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- 行事曆主內容區 -->
    <main id="calendar-main" class="flex-1 w-full max-w-6xl mx-auto p-3 sm:p-6 pb-24 relative print:hidden">

        <!-- 年度右上角：年度總表清單按鈕 -->
        <div id="year-list-btn-container" class="hidden absolute top-4 sm:top-7 right-4 sm:right-7 z-10">
            <button onclick="openYearlyListModal()" class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-1.5 rounded-lg shadow-sm text-sm font-bold flex items-center gap-1.5 transition-colors border border-indigo-700 shadow-md">
                <i class="fa-solid fa-list-check"></i> 學年度清單
            </button>
        </div>
        
        <div id="calendar-grid" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden min-h-[60vh]">
            <!-- 行事曆內容由 JS 動態生成 -->
        </div>
    </main>

    <!-- 課表主內容區 (全裝置強制顯示網格) -->
    <main id="schedule-main" class="hidden flex-1 w-full max-w-6xl mx-auto p-1.5 sm:p-6 pb-20 print:hidden">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="flex border-b border-slate-200 bg-slate-50 font-bold text-slate-600 text-[11px] sm:text-base">
                <div class="w-16 sm:w-1/6 p-1 sm:p-3 text-center border-r border-slate-200 flex items-center justify-center shrink-0">時間</div>
                <div class="flex-1 p-1 sm:p-3 text-center border-r border-slate-100">一</div>
                <div class="flex-1 p-1 sm:p-3 text-center border-r border-slate-100">二</div>
                <div class="flex-1 p-1 sm:p-3 text-center border-r border-slate-100">三</div>
                <div class="flex-1 p-1 sm:p-3 text-center border-r border-slate-100">四</div>
                <div class="flex-1 p-1 sm:p-3 text-center">五</div>
            </div>
            <div id="schedule-grid" class="flex flex-col">
                <!-- 課表內容由 JS 動態生成 -->
            </div>
        </div>
    </main>

    <!-- 行事曆專屬：新增任務浮動按鈕 -->
    <button id="task-fab" onclick="openTaskModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-xl hover:bg-indigo-700 hover:scale-105 transition-all flex items-center justify-center z-40 active:scale-95 print:hidden">
        <i class="fa-solid fa-plus text-2xl"></i>
    </button>

    <!-- ================= MODALS 區塊 ================= -->

    <!-- 年度(學年度)條列清單 Modal -->
    <div id="yearly-list-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[55] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity print:hidden">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden transform transition-all modal-enter flex flex-col h-[85dvh] sm:max-h-[85dvh]" id="yearly-list-modal-content">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="text-lg sm:text-xl font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-book text-indigo-600"></i><span id="yearly-list-title">學年度工作總表</span></h3>
                <div class="flex items-center gap-2">
                    <button onclick="printYearlyList()" class="bg-white text-slate-700 border border-slate-300 hover:bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1.5 transition-colors shadow-sm active:scale-95">
                        <i class="fa-solid fa-print text-indigo-600"></i> 列印
                    </button>
                    <button onclick="closeYearlyListModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors ml-1">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>
            </div>
            <div class="overflow-y-auto flex-1 p-3 sm:p-5 bg-slate-50" id="yearly-list-container">
                <!-- 清單內容由 JS 生成 -->
            </div>
        </div>
    </div>

    <!-- 單月條列清單 Modal -->
    <div id="monthly-list-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[55] hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity print:hidden">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all modal-enter flex flex-col h-[85dvh] sm:max-h-[85dvh]" id="monthly-list-modal-content">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="text-lg font-bold text-slate-800" id="monthly-list-title">當月清單</h3>
                <button onclick="closeMonthlyListModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="overflow-y-auto flex-1 p-2 sm:p-4 bg-slate-50" id="monthly-list-container">
                <!-- 清單內容由 JS 生成 -->
            </div>
        </div>
    </div>

    <!-- 行事曆編輯任務 Modal -->
    <div id="task-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity print:hidden">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all modal-enter flex flex-col max-h-[90dvh]" id="task-modal-content">
            <div class="p-4 sm:p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="text-lg font-bold text-slate-800" id="modal-title">新增紀錄</h3>
                <button onclick="closeTaskModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="p-4 sm:p-5 space-y-4 overflow-y-auto min-h-0 touch-pan-y">
                <input type="hidden" id="task-id">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">日期</label>
                    <input type="date" id="task-date" class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-base bg-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">業務分類</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="task-category" value="discipline" class="peer sr-only" checked>
                            <div class="text-center px-3 py-2 border border-slate-200 bg-white rounded-lg peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 text-sm font-medium transition-all">生教業務</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="task-category" value="pe" class="peer sr-only">
                            <div class="text-center px-3 py-2 border border-slate-200 bg-white rounded-lg peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 text-sm font-medium transition-all">體育業務</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="task-category" value="other" class="peer sr-only">
                            <div class="text-center px-3 py-2 border border-slate-200 bg-white rounded-lg peer-checked:bg-purple-50 peer-checked:border-purple-500 peer-checked:text-purple-700 text-sm font-medium transition-all">其他</div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">事項內容</label>
                    <input type="text" id="task-title" placeholder="請輸入待辦事項或紀錄..." class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-base bg-white" autocomplete="off">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">地點 (選填)</label>
                    <input type="text" id="task-location" placeholder="例：操場、校長室、體育館..." class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-base bg-white" autocomplete="off">
                </div>

                <!-- 雙重勾選：重要業務 與 已完成 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div class="flex items-center gap-2 bg-amber-50/50 p-3 rounded-lg border border-amber-100 cursor-pointer hover:bg-amber-100 transition-colors" onclick="document.getElementById('task-important').click()">
                        <input type="checkbox" id="task-important" onclick="event.stopPropagation()" class="w-5 h-5 text-amber-500 rounded border-amber-300 focus:ring-amber-500 cursor-pointer">
                        <label class="text-sm font-bold text-slate-700 cursor-pointer flex-1 pointer-events-none">標記重要 <i class="fa-solid fa-star text-amber-400 ml-1"></i></label>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-100 p-3 rounded-lg border border-slate-200 cursor-pointer hover:bg-slate-200 transition-colors" onclick="document.getElementById('task-completed').click()">
                        <input type="checkbox" id="task-completed" onclick="event.stopPropagation()" class="w-5 h-5 text-slate-600 rounded border-slate-300 focus:ring-slate-500 cursor-pointer">
                        <label class="text-sm font-bold text-slate-700 cursor-pointer flex-1 pointer-events-none">標記已完成 <i class="fa-solid fa-check text-slate-500 ml-1"></i></label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1 flex items-center justify-between">
                        備註說明 (選填)
                    </label>
                    <textarea id="task-desc" rows="3" placeholder="添加更多細節..." class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow resize-none text-base bg-white"></textarea>
                </div>
            </div>
            
            <div class="p-4 sm:p-5 border-t border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 pb-8 sm:pb-5">
                <button type="button" id="btn-delete" onclick="confirmDeleteTask()" class="text-red-500 hover:bg-red-100 px-3 py-2 rounded-lg transition-colors font-medium hidden flex items-center gap-1 active:scale-95">
                    <i class="fa-regular fa-trash-can"></i> 刪除
                </button>
                <div class="flex gap-3 ml-auto">
                    <button type="button" onclick="closeTaskModal()" class="px-4 py-2 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors font-medium active:scale-95 shadow-sm">取消</button>
                    <button type="button" onclick="saveTask()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium shadow-sm active:scale-95">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 行事曆刪除確認 Modal -->
    <div id="delete-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity print:hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all modal-enter" id="delete-confirm-content">
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">確定要刪除此紀錄嗎？</h3>
                <p class="text-sm text-slate-500 mb-6">刪除後將無法復原，請確認是否繼續。</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="cancelDeleteTask()" class="px-5 py-2.5 text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors font-medium flex-1">取消</button>
                    <button onclick="executeDeleteTask()" class="px-5 py-2.5 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-medium flex-1 shadow-sm">確定刪除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 課表編輯 Modal -->
    <div id="schedule-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity print:hidden">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all modal-enter flex flex-col max-h-[90dvh]" id="schedule-modal-content">
            <div class="p-4 sm:p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="text-lg font-bold text-slate-800">編輯課程</h3>
                <button onclick="closeScheduleModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-200 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <div class="p-4 sm:p-5 space-y-4 overflow-y-auto min-h-0 touch-pan-y">
                <div class="flex gap-2">
                    <div class="flex-1 bg-slate-100 p-2 rounded-lg text-center">
                        <span class="block text-xs text-slate-500 mb-0.5">星期</span>
                        <span class="font-bold text-slate-700" id="edit-day-display">星期一</span>
                    </div>
                    <div class="flex-1 bg-slate-100 p-2 rounded-lg text-center">
                        <span class="block text-xs text-slate-500 mb-0.5">節次</span>
                        <span class="font-bold text-slate-700" id="edit-period-display">第 1 節</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">科目 / 事項名稱</label>
                    <input type="text" id="course-name" placeholder="例：體育、生教巡堂、空堂" class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow text-base bg-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">班級 / 地點 (選填)</label>
                    <input type="text" id="course-location" placeholder="例：701班、操場" class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow text-base bg-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">標籤顏色</label>
                    <div class="grid grid-cols-4 gap-3" id="schedule-color-picker">
                        <!-- JS 動態生成 -->
                    </div>
                </div>
            </div>
            
            <div class="p-4 sm:p-5 border-t border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 pb-8 sm:pb-5">
                <button type="button" onclick="confirmClearCourse()" class="text-red-500 hover:bg-red-100 px-3 py-2 rounded-lg transition-colors font-medium flex items-center gap-1 active:scale-95">
                    <i class="fa-regular fa-trash-can"></i> 清除
                </button>
                <div class="flex gap-3">
                    <button type="button" onclick="closeScheduleModal()" class="px-4 py-2 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors font-medium active:scale-95 shadow-sm">取消</button>
                    <button type="button" onclick="saveCourse()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium shadow-sm active:scale-95">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 課表刪除確認 Modal -->
    <div id="schedule-delete-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity print:hidden">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all modal-enter" id="schedule-delete-confirm-content">
            <div class="p-6 text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">確定要清除此節課嗎？</h3>
                <p class="text-sm text-slate-500 mb-6">清除後該節次將變為空堂。</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="cancelClearCourse()" class="px-5 py-2.5 text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors font-medium flex-1">取消</button>
                    <button onclick="executeClearCourse()" class="px-5 py-2.5 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-medium flex-1 shadow-sm">確定清除</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-[999] flex flex-col gap-2 pointer-events-none print:hidden"></div>

    <script>
        let state = {
            appMode: 'calendar', 
            currentDate: new Date(),
            view: 'month',
            tasks: [],
            scheduleData: {}
        };

        const daysOfWeek = ['日', '一', '二', '三', '四', '五', '六'];
        
        // 台灣國定假日表 (依照圖片指定日期全面更新)
        const twHolidays = {};
        [2025, 2026, 2027, 2028].forEach(y => {
            twHolidays[`${y}-02-14`]="農曆春節"; twHolidays[`${y}-02-15`]="農曆春節"; twHolidays[`${y}-02-16`]="農曆春節"; twHolidays[`${y}-02-17`]="農曆春節"; twHolidays[`${y}-02-18`]="農曆春節"; twHolidays[`${y}-02-19`]="農曆春節"; twHolidays[`${y}-02-20`]="農曆春節"; twHolidays[`${y}-02-21`]="農曆春節"; twHolidays[`${y}-02-22`]="農曆春節";
            twHolidays[`${y}-02-27`]="和平紀念日"; twHolidays[`${y}-02-28`]="和平紀念日"; twHolidays[`${y}-03-01`]="和平紀念日";
            twHolidays[`${y}-04-03`]="兒童節及清明節"; twHolidays[`${y}-04-04`]="兒童節及清明節"; twHolidays[`${y}-04-05`]="兒童節及清明節"; twHolidays[`${y}-04-06`]="兒童節及清明節";
            twHolidays[`${y}-05-01`]="勞動節"; twHolidays[`${y}-05-02`]="勞動節"; twHolidays[`${y}-05-03`]="勞動節";
            twHolidays[`${y}-06-19`]="端午節"; twHolidays[`${y}-06-20`]="端午節"; twHolidays[`${y}-06-21`]="端午節";
            twHolidays[`${y}-09-25`]="中秋節及教師節"; twHolidays[`${y}-09-26`]="中秋節及教師節"; twHolidays[`${y}-09-27`]="中秋節及教師節"; twHolidays[`${y}-09-28`]="中秋節及教師節";
            twHolidays[`${y}-10-09`]="國慶日"; twHolidays[`${y}-10-10`]="國慶日"; twHolidays[`${y}-10-11`]="國慶日";
            twHolidays[`${y}-10-24`]="光復節"; twHolidays[`${y}-10-25`]="光復節"; twHolidays[`${y}-10-26`]="光復節";
            twHolidays[`${y}-12-25`]="行憲紀念日"; twHolidays[`${y}-12-26`]="行憲紀念日"; twHolidays[`${y}-12-27`]="行憲紀念日";
        });

        const categoryConfig = {
            discipline: { color: 'bg-blue-100 text-blue-700 border-blue-200 hover:bg-blue-200', dot: 'bg-blue-500', label: '生' },
            pe: { color: 'bg-emerald-100 text-emerald-700 border-emerald-200 hover:bg-emerald-200', dot: 'bg-emerald-500', label: '體' },
            other: { color: 'bg-purple-100 text-purple-700 border-purple-200 hover:bg-purple-200', dot: 'bg-purple-500', label: '他' }
        };

        let currentEditingTaskId = null;

        function switchAppMode(mode) {
            state.appMode = mode;
            const navCalendar = document.getElementById('nav-calendar');
            const navSchedule = document.getElementById('nav-schedule');
            
            const calendarHeader = document.getElementById('calendar-header-controls');
            const scheduleHeader = document.getElementById('schedule-header-controls');
            const calendarMain = document.getElementById('calendar-main');
            const scheduleMain = document.getElementById('schedule-main');
            const taskFab = document.getElementById('task-fab');

            if (mode === 'calendar') {
                navCalendar.classList.replace('text-indigo-100', 'text-white');
                navCalendar.classList.replace('hover:bg-white/10', 'bg-white/20');
                navCalendar.classList.add('shadow-sm');
                navSchedule.classList.replace('text-white', 'text-indigo-100');
                navSchedule.classList.replace('bg-white/20', 'hover:bg-white/10');
                navSchedule.classList.remove('shadow-sm');

                if(calendarHeader) { calendarHeader.classList.remove('hidden'); calendarHeader.classList.add('flex'); }
                if(scheduleHeader) { scheduleHeader.classList.remove('flex'); scheduleHeader.classList.add('hidden'); }
                if(calendarMain) calendarMain.classList.remove('hidden');
                if(scheduleMain) scheduleMain.classList.add('hidden');
                if(taskFab) taskFab.classList.remove('hidden');
                renderCalendar();
            } else {
                navSchedule.classList.replace('text-indigo-100', 'text-white');
                navSchedule.classList.replace('hover:bg-white/10', 'bg-white/20');
                navSchedule.classList.add('shadow-sm');
                navCalendar.classList.replace('text-white', 'text-indigo-100');
                navCalendar.classList.replace('bg-white/20', 'hover:bg-white/10');
                navCalendar.classList.remove('shadow-sm');

                if(calendarHeader) { calendarHeader.classList.remove('flex'); calendarHeader.classList.add('hidden'); }
                if(scheduleHeader) { scheduleHeader.classList.remove('hidden'); scheduleHeader.classList.add('flex'); }
                if(calendarMain) calendarMain.classList.add('hidden');
                if(scheduleMain) scheduleMain.classList.remove('hidden');
                if(taskFab) taskFab.classList.add('hidden');
                renderSchedule();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.updateTasksFromCloud = function(tasks) {
            state.tasks = tasks;
            renderCalendar();
            checkReminders();
        };

        function autoScroll() {
            setTimeout(() => {
                // 若為單月視圖，強制回到最上方，以利查看星期與日期
                if (state.view === 'month') {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                    return;
                }
                
                // 尋找畫面中是否有「今天」的格子
                const todayEl = document.querySelector('.bg-indigo-50.border-indigo-200') || document.querySelector('.bg-indigo-50\\/30');
                if (todayEl) {
                    // 如果有今天，將畫面捲動定位至今天的位置
                    const topNavHeight = document.getElementById('top-nav-bar').offsetHeight;
                    const elementPosition = todayEl.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - topNavHeight - 10;
                    window.scrollTo({ top: offsetPosition, behavior: "smooth" });
                } else {
                    // 如果沒有今天 (別的月份或週次)，則回到最頂部
                    window.scrollTo({ top: 0, behavior: "smooth" });
                }
            }, 100);
        }

        function setView(view) {
            state.view = view;
            document.querySelectorAll('#view-day, #view-week, #view-month, #view-year').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`view-${view}`);
            activeBtn.classList.remove('text-slate-500');
            activeBtn.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
            
            // 按鈕顯示邏輯
            const headerMonthBtn = document.getElementById('month-list-btn-header');
            if (headerMonthBtn) headerMonthBtn.classList.add('hidden');
            
            const yearListBtn = document.getElementById('year-list-btn-container');
            if (yearListBtn) yearListBtn.classList.add('hidden');
            
            if (view === 'month' && headerMonthBtn) headerMonthBtn.classList.remove('hidden');
            if (view === 'year' && yearListBtn) yearListBtn.classList.remove('hidden');
            
            renderCalendar();
            autoScroll();
        }

        function changeDate(delta) {
            const newDate = new Date(state.currentDate);
            if (state.view === 'day') newDate.setDate(newDate.getDate() + delta);
            else if (state.view === 'week') newDate.setDate(newDate.getDate() + (delta * 7));
            else if (state.view === 'month') newDate.setMonth(newDate.getMonth() + delta);
            else if (state.view === 'year') newDate.setFullYear(newDate.getFullYear() + delta);
            state.currentDate = newDate;
            renderCalendar();
            autoScroll();
        }

        function goToToday() {
            state.currentDate = new Date();
            renderCalendar();
            autoScroll();
        }

        function jumpToDate(dateString) {
            if (!dateString) return;
            const [y, m, d] = dateString.split('-');
            state.currentDate = new Date(y, m - 1, d);
            renderCalendar();
            autoScroll();
        }

        function getTasksForDate(dateStr) {
            return state.tasks.filter(t => t.date === dateStr);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const dateDisplay = document.getElementById('current-date-display');
            grid.innerHTML = '';
            grid.className = 'bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden';

            const year = state.currentDate.getFullYear();
            const month = state.currentDate.getMonth();
            const date = state.currentDate.getDate();

            // 確保隱形選單的值與當前畫面同步
            const datePicker = document.getElementById('date-picker-input');
            if (datePicker) datePicker.value = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;

            if (state.view === 'month') {
                dateDisplay.innerText = `${year}年 ${month + 1}月`;
                renderMonthView(grid, year, month);
            } else if (state.view === 'week') {
                renderWeekView(grid, state.currentDate);
            } else if (state.view === 'day') {
                dateDisplay.innerText = `${month + 1}月${date}日`;
                renderDayView(grid, state.currentDate);
            } else if (state.view === 'year') {
                dateDisplay.innerText = `${year}年`;
                renderYearView(grid, year);
            }
        }

        function renderMonthView(grid, year, month) {
            grid.classList.add('grid', 'grid-cols-7');
            daysOfWeek.forEach(day => {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'text-center py-2 sm:py-3 text-xs sm:text-sm font-bold text-slate-500 bg-slate-50 border-b border-slate-200';
                dayDiv.innerText = day;
                grid.appendChild(dayDiv);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'p-1 sm:p-2 border-b border-r border-slate-100 bg-slate-50/50 min-h-[90px] sm:min-h-[120px]';
                grid.appendChild(emptyDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
                const isWeekend = new Date(year, month, i).getDay() === 0 || new Date(year, month, i).getDay() === 6;
                const holidayName = twHolidays[dateStr]; 
                
                const dayDiv = document.createElement('div');
                let bgClass = 'bg-white';
                if (isToday) bgClass = 'bg-indigo-50/30';
                else if (holidayName || isWeekend) bgClass = 'bg-red-50/40';

                dayDiv.className = `p-1 border-b border-r border-slate-100 min-h-[90px] sm:min-h-[120px] transition-colors hover:bg-slate-50 group cursor-pointer ${bgClass}`;
                dayDiv.onclick = (e) => {
                    if(e.target === dayDiv || e.target.classList.contains('day-header')) openTaskModal(dateStr);
                };
                
                let dateHeaderHtml = `<div class="day-header flex justify-between items-start mb-1 px-0.5">`;
                if (isToday) {
                    dateHeaderHtml += `<span class="w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center bg-indigo-600 text-white rounded-full text-xs sm:text-sm font-bold shadow-sm">${i}</span>`;
                } else if (holidayName) {
                    dateHeaderHtml += `<span class="w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center bg-red-100 text-red-500 rounded-full text-xs sm:text-sm font-bold">${i}</span>`;
                } else {
                    let textClass = isWeekend ? 'text-red-500 font-bold' : 'text-slate-700 font-medium';
                    dateHeaderHtml += `<span class="text-sm sm:text-base ${textClass} ml-1 mt-0.5">${i}</span>`;
                }
                dateHeaderHtml += `</div>`;

                const tasks = getTasksForDate(dateStr);
                let tasksHtml = '<div class="space-y-1">';
                tasks.forEach(task => {
                    const conf = categoryConfig[task.category];
                    const starIcon = task.isImportant ? '<i class="fa-solid fa-star text-amber-400 text-[10px] ml-0.5"></i>' : '';
                    const completedClass = task.isCompleted ? 'opacity-60 grayscale bg-slate-50' : conf.color;
                    const locIcon = task.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.location)}" target="_blank" onclick="event.stopPropagation()" class="hover:text-indigo-600 transition-colors" title="在 Google Maps 開啟"><i class="fa-solid fa-map-location-dot text-slate-400 text-[10px] ml-0.5"></i></a>` : '';
                    const imgIcon = task.imageUrl ? `<i class="fa-solid fa-image text-indigo-400 text-[10px] ml-0.5"></i>` : '';
                    
                    // 單月視圖：不顯示生、體字首，讓空間極大化，標題直接緊連圖示
                    tasksHtml += `
                        <div onclick="editTask('${task.id}')" class="truncate text-[10px] sm:text-xs px-1.5 sm:px-2 py-1 rounded border transition-transform hover:scale-[102%] cursor-pointer flex items-center shadow-sm ${completedClass}">
                            <span class="truncate font-bold flex-1">${task.title}</span>
                            <div class="flex items-center shrink-0 ml-1 z-10">${locIcon}${imgIcon}${starIcon}</div>
                        </div>
                    `;
                });
                tasksHtml += '</div>';

                dayDiv.innerHTML = dateHeaderHtml + tasksHtml;
                grid.appendChild(dayDiv);
            }
        }

        function renderWeekView(grid, currentDate) {
            // 單週視圖改成「橫列清單式」，左邊顯示日期，右邊顯示詳細任務
            grid.classList.remove('grid', 'grid-cols-7');
            grid.classList.add('flex', 'flex-col');
            const startOfWeek = new Date(currentDate);
            startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
            const today = new Date();
            let html = '';

            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                const isToday = today.toDateString() === date.toDateString();
                const isWeekend = i === 0 || i === 6;
                const holidayName = twHolidays[dateStr];
                const tasks = getTasksForDate(dateStr);
                
                let bgClass = 'bg-white';
                if (isToday) bgClass = 'bg-indigo-50 border-indigo-200 shadow-sm z-10';
                else if (holidayName || isWeekend) bgClass = 'bg-red-50/40';

                html += `
                <div class="flex flex-col md:flex-row border-b border-slate-200 last:border-0 ${bgClass} transition-colors min-h-[100px]">
                    <div class="md:w-32 p-3 sm:p-4 border-b md:border-b-0 md:border-r border-slate-100 flex md:flex-col justify-between md:justify-start items-center md:items-start shrink-0 cursor-pointer" onclick="openTaskModal('${dateStr}')">
                        <div class="flex items-baseline gap-2 md:gap-0 md:flex-col">
                            <span class="text-xs sm:text-sm font-bold text-slate-500 mb-1">${daysOfWeek[i]}</span>
                            <div class="flex items-center gap-2">
                                ${isToday ? 
                                    `<span class="w-7 h-7 flex items-center justify-center bg-indigo-600 text-white rounded-full text-sm font-bold shadow-sm">${date.getDate()}</span>` : 
                                    `<span class="text-xl sm:text-2xl font-bold ${(holidayName || isWeekend) ? 'text-red-500' : 'text-slate-700'}">${date.getDate()}</span>`
                                }
                                <span class="text-xs sm:text-sm font-medium text-slate-400 md:hidden">${date.getMonth() + 1}月</span>
                            </div>
                        </div>
                        ${holidayName ? `<div class="text-xs text-red-500 font-bold bg-red-100 px-2 py-1 rounded-md md:mt-2">${holidayName}</div>` : ''}
                    </div>
                    <div class="flex-1 p-3 sm:p-4 bg-transparent min-h-[80px]">
                        ${tasks.length === 0 ? 
                            `<div class="h-full flex items-center text-slate-300 text-sm italic cursor-pointer group" onclick="openTaskModal('${dateStr}')">
                                <span class="group-hover:text-indigo-400 transition-colors"><i class="fa-solid fa-plus mr-1"></i>點擊新增事項</span>
                             </div>` : 
                            `<div class="flex flex-col gap-2">
                                ${tasks.map(task => {
                                    const conf = categoryConfig[task.category];
                                    const completedClass = task.isCompleted ? 'opacity-60 grayscale bg-slate-50 border-slate-200' : conf.color;
                                    const textLineThrough = task.isCompleted ? 'line-through text-slate-500' : '';
                                    const locLink = task.location ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.location)}" target="_blank" onclick="event.stopPropagation()" class="text-xs sm:text-sm font-medium opacity-90 whitespace-nowrap hover:text-indigo-600 hover:underline z-10"><i class="fa-solid fa-map-location-dot mr-1 text-slate-400"></i> ${task.location}</a>` : '';
                                    const imgThumb = task.imageUrl ? `<div class="mt-1"><img src="${task.imageUrl}" class="h-10 rounded border border-slate-200 object-cover shadow-sm"></div>` : '';

                                    return `
                                    <div onclick="editTask('${task.id}')" class="p-2 sm:p-2.5 rounded-lg border ${completedClass} flex flex-col md:flex-row md:items-center gap-1 md:gap-3 cursor-pointer hover:shadow-sm transition-all active:scale-[99%] relative">
                                        <div class="flex items-center gap-2 shrink-0">
                                            <span class="w-6 h-6 rounded flex items-center justify-center text-xs font-bold text-white ${conf.dot}">${conf.label}</span>
                                            <span class="font-bold text-sm sm:text-base ${textLineThrough}">${task.title}</span>
                                            ${task.isImportant ? '<i class="fa-solid fa-star text-amber-400"></i>' : ''}
                                        </div>
                                        <div class="flex flex-col md:flex-row flex-1 gap-1 md:gap-3 md:ml-2 overflow-hidden items-start md:items-center">
                                            ${locLink}
                                            ${task.desc ? `<p class="text-xs sm:text-sm opacity-80 truncate flex-1 ${textLineThrough}"><i class="fa-solid fa-align-left mr-1"></i>${task.desc}</p>` : ''}
                                            ${imgThumb}
                                        </div>
                                    </div>`;
                                }).join('')}
                            </div>`
                        }
                    </div>
                </div>`;
            }
            grid.innerHTML = html;
            const d = new Date(startOfWeek);
            const dEnd = new Date(startOfWeek); dEnd.setDate(dEnd.getDate() + 6);
            document.getElementById('current-date-display').innerText = `${d.getMonth()+1}/${d.getDate()} - ${dEnd.getMonth()+1}/${dEnd.getDate()}`;
        }

        function renderDayView(grid, date) {
            grid.classList.remove('grid', 'grid-cols-7');
            grid.classList.add('flex', 'flex-col');
            const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            const tasks = getTasksForDate(dateStr);
            const holidayName = twHolidays[dateStr];

            let html = `
                <div class="p-6 sm:p-8 bg-indigo-50/30 border-b border-indigo-100 flex flex-col items-center justify-center relative cursor-pointer group" onclick="openTaskModal('${dateStr}')">
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-white/50 backdrop-blur-[1px]">
                        <span class="bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-sm"><i class="fa-solid fa-plus mr-2"></i>新增今日事項</span>
                    </div>
                    <span class="text-sm font-bold text-indigo-500 mb-2 tracking-widest">星期${daysOfWeek[date.getDay()]}</span>
                    <span class="text-5xl sm:text-6xl font-black ${holidayName ? 'text-red-500' : 'text-slate-800'} mb-2">${date.getDate()}</span>
                    ${holidayName ? `<span class="text-sm text-red-600 font-bold bg-red-100 px-3 py-1 rounded-full shadow-sm">${holidayName}</span>` : ''}
                </div>
                <div class="p-4 sm:p-6 flex-1 bg-slate-50/50">
            `;

            if (tasks.length === 0) {
                html += `<div class="h-40 flex flex-col items-center justify-center text-slate-400"><i class="fa-solid fa-mug-hot text-4xl mb-3 text-slate-300"></i><p class="font-medium">今日尚無安排事項</p></div>`;
            } else {
                html += '<div class="space-y-3 sm:space-y-4">';
                tasks.forEach(task => {
                    const conf = categoryConfig[task.category];
                    const completedClass = task.isCompleted ? 'opacity-60 grayscale bg-slate-50' : 'bg-white';
                    const textLineThrough = task.isCompleted ? 'line-through text-slate-500' : 'text-slate-800 group-hover:text-indigo-600';

            for (let month = 0; month < 12; month++) {
                html += `<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 hover:shadow-md transition-shadow cursor-pointer" onclick="state.currentDate = new Date(${year}, ${month}, 1); setView('month');">`;

                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) html += `<div></div>`;
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    const dayTasks = getTasksForDate(dateStr);
                    const hasTask = dayTasks.length > 0;
                    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
                    const holidayName = twHolidays[dateStr];
                    
                    let cls = 'w-6 h-6 sm:w-7 sm:h-7 mx-auto rounded-full flex items-center justify-center text-[10px] sm:text-xs font-medium transition-transform hover:scale-110 relative group ';

                    else if (holidayName) cls += 'text-red-500 font-bold bg-red-50';
                    else cls += 'text-slate-600 hover:bg-slate-100';
                    
                    if (hasTask) {
                        let taskList = dayTasks.map(t => `<div class="truncate text-left">▪ ${t.title}</div>`).join('');

                        html += `<div class="${cls}" onclick="event.stopPropagation()">${i}<span class="absolute -bottom-0.5 left-1/2 transform -translate-x-1/2 w-1 h-1 bg-amber-500 rounded-full"></span>${tooltip}</div>`;
                    } else {
                        html += `<div class="${cls}">${i}</div>`;
                    }
                }
                html += `</div></div>`;
            }
            grid.innerHTML = html;
        }

        function getAcademicYear(date) {
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            // 台灣學年度算法：8月開始算新年。 例如：2026年8月 -> 115學年
            return m >= 8 ? y - 1911 : y - 1912;
        }

            const date = state.currentDate;

        function openTaskModal(dateStr = '') {
            currentEditingTaskId = null;
            document.getElementById('task-id').value = '';
            
            if (!dateStr) {
                const tzoffset = (new Date()).getTimezoneOffset() * 60000; 
                dateStr = (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
            }
            
            const holiday = twHolidays[dateStr];
            document.getElementById('modal-title').innerHTML = holiday ? `新增紀錄 <span class="text-sm bg-red-100 text-red-500 px-2.5 py-0.5 rounded-full ml-2 align-middle font-bold">${holiday}</span>` : '新增紀錄';

            document.getElementById('task-date').value = dateStr;
            document.getElementById('task-title').value = '';
            document.getElementById('task-location').value = '';
            document.getElementById('task-important').checked = false;
            document.getElementById('task-completed').checked = false;
            document.getElementById('task-desc').value = '';
            document.querySelector('input[name="task-category"][value="discipline"]').checked = true;
            
            // 新增時隱藏刪除按鈕

                content.classList.add('modal-enter-active');

        function editTask(taskId) {
            const task = state.tasks.find(t => t.id === taskId);
            if (!task) return;

            currentEditingTaskId = taskId;
            
            const holiday = twHolidays[task.date];
            document.getElementById('modal-title').innerHTML = holiday ? `編輯紀錄 <span class="text-sm bg-red-100 text-red-500 px-2.5 py-0.5 rounded-full ml-2 align-middle font-bold">${holiday}</span>` : '編輯紀錄';
            
            document.getElementById('task-id').value = task.id;
            document.getElementById('task-date').value = task.date;
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-location').value = task.location || '';
            document.getElementById('task-important').checked = task.isImportant || false;
            document.getElementById('task-completed').checked = task.isCompleted || false;
            document.getElementById('task-desc').value = task.desc || '';
            document.querySelector(`input[name="task-category"][value="${task.category}"]`).checked = true;

        async function saveTask() {
            const title = document.getElementById('task-title').value.trim();
            if (!title) { showToast('請輸入事項內容', 'error'); return; }

            const taskData = {
                date: document.getElementById('task-date').value,
                category: document.querySelector('input[name="task-category"]:checked').value,
                title: title,
                location: document.getElementById('task-location').value.trim(),
                isImportant: document.getElementById('task-important').checked,
                isCompleted: document.getElementById('task-completed').checked,
                desc: document.getElementById('task-desc').value.trim(),
                timestamp: Date.now()
            };

            const isNew = !currentEditingTaskId;
            if (isNew) {
                taskData.id = 'task_' + Date.now();
                state.tasks.push(taskData);
                if (window.cloudAddTask) await window.cloudAddTask(taskData);
                showToast('已新增紀錄');
            } else {
                taskData.id = currentEditingTaskId;
                const index = state.tasks.findIndex(t => t.id === currentEditingTaskId);
                if (index !== -1) state.tasks[index] = taskData;
                if (window.cloudUpdateTask) await window.cloudUpdateTask(currentEditingTaskId, taskData);
                showToast('已更新紀錄');
            }

            renderCalendar();
            closeTaskModal();
        }

        };
        let editingScheduleSlot = null;

        window.updateScheduleFromCloud = function(data) {
            state.scheduleData = data;
            if (state.appMode === 'schedule') renderSchedule();
        };

        function onScheduleSelectChange() {
            const select = document.getElementById('schedule-selector');
            showToast('切換課表中...', 'success');
            state.scheduleData = {};
            renderSchedule(); 
            if (window.switchCloudSchedule) window.switchCloudSchedule(select.value);
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-grid');
            let html = '';
            schedulePeriods.forEach(period => {
                if (period.isBreak) {
                    html += `
                    <div class="flex border-b border-slate-200 bg-slate-100/50">
                        <div class="w-16 sm:w-1/6 p-1 sm:p-3 flex flex-col items-center justify-center border-r border-slate-200 text-slate-500 shrink-0">
                            <span class="font-bold text-[10px] sm:text-sm text-center">午餐+午休</span>
                            <span class="text-[8px] sm:text-xs opacity-70 mt-0.5 text-center px-1">${period.time.replace('~', '<br class="sm:hidden">~<br class="sm:hidden">')}</span>
                        </div>
                        <div class="flex-1 p-2 sm:p-3 flex items-center justify-center text-slate-400 font-medium tracking-widest sm:tracking-[1em] text-xs sm:text-sm">
                            REST TIME
                        </div>
                    </div>`;
                    return;
                }

                html += `<div class="flex border-b border-slate-100 last:border-b-0 min-h-[65px] sm:min-h-[90px]">
                    <div class="w-16 sm:w-1/6 p-1 sm:p-2 flex flex-col items-center justify-center border-r border-slate-200 bg-slate-50 shrink-0">
                        <span class="font-bold text-slate-700 text-[10px] sm:text-[15px] text-center leading-tight">${period.name}</span>
                        <span class="text-[8px] sm:text-[11px] text-slate-400 mt-1 text-center">${period.time.replace('~', '<br class="sm:hidden">~<br class="sm:hidden">')}</span>
                    </div>`;
                
                for (let day = 1; day <= 5; day++) {
                    const key = `${day}-${period.id}`;
                    const data = state.scheduleData[key];
                    html += `<div class="flex-1 p-0.5 sm:p-1.5 border-r border-slate-100 last:border-r-0 group">`;
                    if (!data) {
                        html += `<div class="h-full w-full flex items-center justify-center text-slate-300 border-2 border-dashed border-transparent hover:border-slate-200 rounded sm:rounded-lg transition-colors cursor-pointer" onclick="openScheduleModal(${day}, '${period.id}')">
                            <i class="fa-solid fa-plus opacity-0 group-hover:opacity-100 transition-opacity text-xs sm:text-base"></i>
                        </div>`;
                    } else {
                        const colorTheme = scheduleColors[data.color] || scheduleColors['gray'];
                        html += `
                        <div class="h-full w-full rounded sm:rounded-lg ${colorTheme.bg} ${colorTheme.border} border p-1 sm:p-2 flex flex-col justify-center items-center cursor-pointer hover:shadow-md transition-all active:scale-95" onclick="openScheduleModal(${day}, '${period.id}')">
                            <div class="font-bold text-[10px] sm:text-[15px] ${colorTheme.text} leading-tight text-center break-words w-full px-0.5 overflow-hidden" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${data.name}</div>
                            ${data.location ? `<div class="text-[8px] sm:text-[11px] ${colorTheme.text} opacity-80 mt-0.5 sm:mt-1 truncate text-center w-full"><i class="fa-solid fa-location-dot mr-0.5 sm:mr-1"></i>${data.location}</div>` : ''}
                        </div>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function renderScheduleColorPicker() {
            const container = document.getElementById('schedule-color-picker');
            let html = '';
            for (const [key, theme] of Object.entries(scheduleColors)) {
                html += `
                <label class="cursor-pointer group">
                    <input type="radio" name="course-color" value="${key}" class="peer sr-only">
                    <div class="h-10 rounded-lg ${theme.bg} border-2 border-transparent peer-checked:${theme.border} peer-checked:ring-2 peer-checked:ring-offset-1 peer-checked:ring-${theme.text.split('-')[1]}-400 flex items-center justify-center transition-all hover:opacity-80">
                        <i class="fa-solid fa-check opacity-0 peer-checked:opacity-100 ${theme.text}"></i>
                    </div>
                </label>`;
            }
            container.innerHTML = html;
        }

        function openScheduleModal(day, periodId) {
            editingScheduleSlot = `${day}-${periodId}`;
            document.getElementById('edit-day-display').innerText = scheduleDays[day - 1];
            const pObj = schedulePeriods.find(p => p.id == periodId);
            document.getElementById('edit-period-display').innerText = pObj ? pObj.name : '';
            
            const data = state.scheduleData[editingScheduleSlot] || { name: '', location: '', color: 'emerald' };
            document.getElementById('course-name').value = data.name;
            document.getElementById('course-location').value = data.location;
            
            const colorRadio = document.querySelector(`input[name="course-color"][value="${data.color}"]`);
            if (colorRadio) colorRadio.checked = true;

            const modal = document.getElementById('schedule-modal');
            const content = document.getElementById('schedule-modal-content');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => { 
                content.classList.remove('modal-enter'); 
                content.classList.add('modal-enter-active'); 
                setTimeout(() => document.getElementById('course-name').focus(), 100);
            });
        }

        function closeScheduleModal() {
            const modal = document.getElementById('schedule-modal');
            const content = document.getElementById('schedule-modal-content');
            content.classList.remove('modal-enter-active');
            content.classList.add('modal-exit-active');
            setTimeout(() => {
                modal.classList.add('hidden');
                content.classList.remove('modal-exit-active');
                content.classList.add('modal-enter');
            }, 200);
        }

        async function saveCourse() {
            if (!editingScheduleSlot) return;
            const name = document.getElementById('course-name').value.trim();
            if (!name) { showToast('請輸入科目名稱', 'error'); return; }

            const data = {
                name: name,
                location: document.getElementById('course-location').value.trim(),
                color: document.querySelector('input[name="course-color"]:checked').value
            };

            state.scheduleData[editingScheduleSlot] = data;
            if (window.cloudUpdateSchedule) await window.cloudUpdateSchedule(state.scheduleData);

            renderSchedule();
            closeScheduleModal();
            showToast('已更新課表');
        }

        function confirmClearCourse() {
            if (!editingScheduleSlot || !state.scheduleData[editingScheduleSlot]) {
                closeScheduleModal(); return;
            }
            closeScheduleModal();
            setTimeout(() => {
                const modal = document.getElementById('schedule-delete-confirm-modal');
                const content = document.getElementById('schedule-delete-confirm-content');
                modal.classList.remove('hidden');
                requestAnimationFrame(() => {
                    content.classList.remove('modal-enter');
                    content.classList.add('modal-enter-active');
                });
            }, 250);
        }

        function cancelClearCourse() {
            const modal = document.getElementById('schedule-delete-confirm-modal');
            const content = document.getElementById('schedule-delete-confirm-content');
            content.classList.remove('modal-enter-active');
            content.classList.add('modal-exit-active');
            setTimeout(() => {
                modal.classList.add('hidden');
                content.classList.remove('modal-exit-active');
                content.classList.add('modal-enter');
                const [day, period] = editingScheduleSlot.split('-');
                openScheduleModal(parseInt(day), period);
            }, 200);
        }

        async function executeClearCourse() {
            if (!editingScheduleSlot) return;
            delete state.scheduleData[editingScheduleSlot];
            if (window.cloudUpdateSchedule) await window.cloudUpdateSchedule(state.scheduleData);
            renderSchedule();
            
            const modal = document.getElementById('schedule-delete-confirm-modal');
            const content = document.getElementById('schedule-delete-confirm-content');
            content.classList.remove('modal-enter-active');
            content.classList.add('modal-exit-active');
            setTimeout(() => {
                modal.classList.add('hidden');
                content.classList.remove('modal-exit-active');
                content.classList.add('modal-enter');
            }, 200);
            showToast('已清除該節課');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-slate-800' : 'bg-red-600';
            const icon = type === 'success' ? 'fa-check-circle text-emerald-400' : 'fa-circle-exclamation text-white';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span class="font-medium text-sm">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
            setTimeout(() => { 
                toast.classList.add('opacity-0', 'translate-x-full'); 
                setTimeout(() => toast.remove(), 300); 
            }, 3000);
        }

        function checkReminders() {
            const todayStr = (new Date()).toISOString().split('T')[0];
            const todayTasks = state.tasks.filter(t => t.date === todayStr);
            if (todayTasks.length > 0) {
                setTimeout(() => {
                    showToast(`今日有 ${todayTasks.length} 項排定工作，點擊單日查看！`, 'success');
                }, 1000);
            }
        }

        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let touchEndY = 0;
        const SWIPE_THRESHOLD = 50; 

        function initSwipeGestures() {
            const container = document.body; 
            container.addEventListener('touchstart', e => {
                // 如果在彈出視窗內，或在課表畫面，則不觸發左右滑動換月
                if (e.target.closest('.modal-enter-active') || state.appMode === 'schedule') return;
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            container.addEventListener('touchend', e => {
                if (e.target.closest('.modal-enter-active') || state.appMode === 'schedule') return;
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, { passive: true });
        }

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            // 確保水平滑動大於垂直滑動，且大於閾值
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > SWIPE_THRESHOLD) {
                if (diffX > 0) { 
                    // 往右滑 (看上一個月)
                    if(state.view !== 'year') changeDate(-1); 
                } else { 
                    // 往左滑 (看下一個月)
                    if(state.view !== 'year') changeDate(1); 
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderScheduleColorPicker();
            renderCalendar();
            initSwipeGestures();
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjsLnijwpAYPWxDueowFaa6JaK_CafsHM",
            authDomain: "school-a81e2.firebaseapp.com",
            projectId: "school-a81e2",
            storageBucket: "school-a81e2.firebasestorage.app",
            messagingSenderId: "181296227244",
            appId: "1:181296227244:web:61294cf3b6caf569989009"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const tasksRef = collection(db, 'tasks');
        onSnapshot(tasksRef, (snapshot) => {
            const tasks = [];
            snapshot.forEach((doc) => tasks.push({ id: doc.id, ...doc.data() }));
            window.updateTasksFromCloud(tasks);
        }, (error) => {
            console.error("Firebase Tasks 連線錯誤", error);
            window.showToast("行事曆連線失敗", "error");
        });

        window.cloudAddTask = async (taskData) => await setDoc(doc(tasksRef, taskData.id), taskData);
        window.cloudUpdateTask = async (taskId, taskData) => await updateDoc(doc(tasksRef, taskId), taskData);
        window.cloudDeleteTask = async (taskId) => await deleteDoc(doc(tasksRef, taskId));

        let unsubscribeSchedule = null;
        window.switchCloudSchedule = (scheduleId) => {
            if (unsubscribeSchedule) unsubscribeSchedule();
            const scheduleRef = doc(db, 'settings', scheduleId);
            unsubscribeSchedule = onSnapshot(scheduleRef, (snapshot) => {
                if (snapshot.exists()) window.updateScheduleFromCloud(snapshot.data());
                else { setDoc(scheduleRef, {}); window.updateScheduleFromCloud({}); }
            }, (error) => {
                console.error("Firebase Schedule 連線錯誤", error);
                window.showToast("課表連線失敗", "error");
            });
        };

        window.switchCloudSchedule('my_weekly_schedule');

        window.cloudUpdateSchedule = async (newData) => {
            try {
                const currentId = document.getElementById('schedule-selector').value;
                const scheduleRef = doc(db, 'settings', currentId);
                await setDoc(scheduleRef, newData);
            } catch (error) {
                console.error("儲存失敗", error);
                window.showToast("課表儲存失敗", "error");
            }
        };
    </script>
</body>
