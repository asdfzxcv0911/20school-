<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>組長工作紀錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch; 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .category-discipline { border-left-color: #3b82f6; background-color: #eff6ff; }
        .category-pe { border-left-color: #10b981; background-color: #ecfdf5; }
        
        /* Modal 動畫 */
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
        .modal-exit { opacity: 1; transform: scale(1); }
        .modal-exit-active { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-in; }

        .calendar-cell:hover .add-task-btn { opacity: 1; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 bg-slate-50 min-h-[100dvh] flex flex-col relative pb-20 sm:pb-0 overflow-x-hidden w-full">

    <!-- 統一的黏性頂部容器 (Sticky Top) - 保證不論怎麼滑都不會消失 -->
    <div class="sticky top-0 z-40 w-full shadow-sm flex flex-col shrink-0">
        <header class="bg-white border-b border-slate-200">
            <div class="px-2 sm:px-4 py-2 sm:py-3 flex flex-col sm:flex-row justify-between items-center gap-2 sm:gap-0">
                <div class="flex items-center w-full justify-center sm:w-auto">
                    <h1 id="main-app-title" class="text-base sm:text-lg font-bold text-slate-800 text-center">【學年度生教體育組行事曆】</h1>
                </div>
                
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <button onclick="setFilter('all')" id="filter-all" class="px-3 py-1 text-sm font-medium rounded-md bg-white shadow-sm text-slate-700 transition-colors">全部</button>
                    <button onclick="setFilter('discipline')" id="filter-discipline" class="px-3 py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors">
                        <span class="w-2 h-2 rounded-full bg-blue-500 inline-block mr-1"></span>生教
                    </button>
                    <button onclick="setFilter('pe')" id="filter-pe" class="px-3 py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block mr-1"></span>體育
                    </button>
                </div>
            </div>
        </header>

        <div class="bg-white border-b border-slate-200 px-2 py-2 sm:px-4 flex flex-col sm:flex-row items-center justify-between gap-2 sm:gap-3">
            <div class="flex items-center justify-between w-full sm:w-auto gap-1">
                <div class="flex items-center gap-1 sm:gap-2">
                    <button onclick="navigateDate(-1)" class="p-2 sm:px-3 sm:py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <h2 id="current-date-display" class="text-[15px] sm:text-lg font-bold min-w-[125px] sm:min-w-[140px] text-center truncate px-1"></h2>
                    <button onclick="navigateDate(1)" class="p-2 sm:px-3 sm:py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                <button onclick="resetDate()" class="text-xs sm:text-sm text-indigo-600 font-medium px-2 py-1.5 sm:px-3 sm:py-1.5 rounded-md bg-indigo-50 hover:bg-indigo-100 whitespace-nowrap ml-1 active:scale-95 transition-transform">回到今天</button>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200 w-full justify-between sm:w-auto">
                <button onclick="setView('day')" id="view-day" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors text-center">單日</button>
                <button onclick="setView('week')" id="view-week" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors text-center">單週</button>
                <button onclick="setView('month')" id="view-month" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md bg-white shadow-sm text-slate-700 transition-colors text-center">單月</button>
                <button onclick="setView('year')" id="view-year" class="flex-1 sm:flex-none px-3 sm:px-4 py-1.5 sm:py-1 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700 transition-colors text-center">年度</button>
            </div>
        </div>
    </div>

    <main class="flex-1 w-full max-w-7xl mx-auto p-2 sm:p-4" id="main-content"></main>

    <button onclick="openModal()" class="fixed bottom-[20px] right-[20px] sm:bottom-6 sm:right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:bg-indigo-700 hover:shadow-xl transition-all flex items-center justify-center text-2xl z-20 active:scale-95">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="task-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity">
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all modal-enter flex flex-col max-h-[85dvh]" id="task-modal-content">
            
            <div class="p-4 sm:p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 class="text-lg font-bold text-slate-800" id="modal-title">新增工作事項</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-2 bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            
            <!-- 鎖死橫向滑動，僅允許上下捲動 -->
            <div class="p-4 sm:p-5 space-y-4 overflow-y-auto overflow-x-hidden overscroll-x-none touch-pan-y flex-1 min-h-0 w-full">
                
                <div id="status-container" class="hidden flex items-center justify-between bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <label class="text-sm font-bold text-slate-700 flex items-center gap-2 cursor-pointer w-full" for="task-completed">
                        <i class="fa-regular fa-circle-check text-emerald-600 text-lg"></i> 標記為已完成
                    </label>
                    <input type="checkbox" id="task-completed" class="w-6 h-6 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500 cursor-pointer">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">事項內容</label>
                    <input type="text" id="task-title" placeholder="例如：全校升旗典禮、處理學生衝突..." class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-base">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">地點 (選填)</label>
                    <div class="flex gap-2">
                        <input type="text" id="task-location" placeholder="例如：活動中心、操場..." class="flex-1 px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-base">
                        <button type="button" onclick="openMapsFromInput()" class="px-4 bg-slate-100 text-slate-500 border border-slate-300 rounded-lg hover:bg-slate-200 hover:text-indigo-600 transition-colors flex items-center justify-center active:scale-95" title="在地圖上搜尋此地點">
                            <i class="fa-solid fa-map-location-dot text-lg"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">備註細節 (選填)</label>
                    <textarea id="task-memo" rows="2" placeholder="需要補充的說明或注意事項..." class="w-full px-4 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-shadow text-base resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">所屬組別</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="task-category" value="discipline" class="peer sr-only" checked>
                            <div class="text-center px-4 py-3 sm:py-2 rounded-lg border-2 border-slate-200 peer-checked:border-blue-500 peer-checked:bg-blue-50 text-slate-600 peer-checked:text-blue-700 font-medium transition-all">生教組</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="task-category" value="pe" class="peer sr-only">
                            <div class="text-center px-4 py-3 sm:py-2 rounded-lg border-2 border-slate-200 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 text-slate-600 peer-checked:text-emerald-700 font-medium transition-all">體育組</div>
                        </label>
                    </div>
                </div>

                <div class="bg-red-50 p-3 rounded-lg border border-red-200 flex items-center justify-between mt-1">
                    <label class="text-sm font-bold text-red-700 flex items-center gap-2 cursor-pointer w-full" for="task-important">
                        <i class="fa-solid fa-triangle-exclamation text-lg"></i> 標記為重要事項
                    </label>
                    <input type="checkbox" id="task-important" class="w-6 h-6 rounded border-red-300 text-red-600 focus:ring-red-500 cursor-pointer">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">日期</label>
                        <input type="date" id="task-date" class="w-full px-3 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">時間 (選填)</label>
                        <input type="time" id="task-time" class="w-full px-3 py-3 sm:py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-base">
                    </div>
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                            <i class="fa-regular fa-bell text-indigo-500"></i> 設定提醒推播
                        </label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="task-remind-toggle" class="sr-only peer" onchange="toggleRemindOptions()">
                            <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>
                    <div id="remind-options" class="hidden space-y-3 mt-3 border-t border-slate-200 pt-3">
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">多久前提醒？</label>
                            <select id="task-remind-time" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm outline-none bg-white">
                                <option value="0">時間到時</option>
                                <option value="5">5 分鐘前</option>
                                <option value="10">10 分鐘前</option>
                                <option value="30">30 分鐘前</option>
                                <option value="60">1 小時前</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-4 sm:p-5 border-t border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 pb-8 sm:pb-5">
                <div class="flex gap-2">
                    <button type="button" id="modal-delete-btn" onclick="deleteCurrentTask()" class="hidden text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition-colors font-medium flex items-center gap-1 active:scale-95">
                        <i class="fa-regular fa-trash-can"></i> <span class="hidden sm:inline">刪除</span>
                    </button>
                    <button type="button" id="modal-calendar-btn" onclick="exportToCalendar()" class="hidden text-indigo-600 hover:bg-indigo-50 px-3 py-2 rounded-lg transition-colors font-medium flex items-center gap-1 active:scale-95" title="匯出至手機行事曆">
                        <i class="fa-regular fa-calendar-plus"></i> <span class="hidden sm:inline">加到行事曆</span>
                    </button>
                </div>
                <div class="flex gap-3 ml-auto">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 sm:py-2 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors font-medium active:scale-95">取消</button>
                    <button type="button" onclick="saveTask()" class="px-5 py-2.5 sm:py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium shadow-sm active:scale-95">儲存紀錄</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-[999] flex flex-col gap-2 pointer-events-none"></div>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center transition-opacity duration-300">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i>
        <p class="text-slate-600 font-medium">系統連線與資料同步中...</p>
    </div>

    <div id="delete-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all p-6 text-center modal-enter" id="delete-confirm-content">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-3xl">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">確定要刪除嗎？</h3>
            <p class="text-slate-500 mb-6 text-sm">刪除後將無法復原，請確認是否繼續。</p>
            <div class="flex gap-3 justify-center">
                <button onclick="closeDeleteConfirm()" class="flex-1 px-4 py-3 sm:py-2 text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors font-medium active:scale-95">取消</button>
                <button onclick="confirmDelete()" class="flex-1 px-4 py-3 sm:py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-medium shadow-sm active:scale-95">確定刪除</button>
            </div>
        </div>
    </div>

    <script>
        // 核心狀態
        let state = { tasks: [], currentDate: new Date(), view: 'month', filter: 'all', editingTaskId: null };

        window.updateTasksFromCloud = function(newTasks) {
            state.tasks = newTasks;
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
            render();
        };

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }
        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        const daysOfWeek = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];

        function updateHeaderButtons() {
            ['all', 'discipline', 'pe'].forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if (f === state.filter) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
                    btn.classList.remove('text-slate-500', 'hover:text-slate-700');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
                    btn.classList.add('text-slate-500', 'hover:text-slate-700');
                }
            });
            ['day', 'week', 'month', 'year'].forEach(v => {
                const btn = document.getElementById(`view-${v}`);
                if (v === state.view) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-slate-700');
                    btn.classList.remove('text-slate-500', 'hover:text-slate-700');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-slate-700');
                    btn.classList.add('text-slate-500', 'hover:text-slate-700');
                }
            });
        }

        function setFilter(filter) { state.filter = filter; updateHeaderButtons(); render(); }
        
        function setView(view) { 
            const isSwitching = state.view !== view;
            const targetView = view;
            state.view = view; 
            updateHeaderButtons(); 
            render({ 
                toYear: isSwitching && targetView === 'year',
                toWeek: isSwitching && targetView === 'week',
                toMonth: isSwitching && targetView === 'month'
            }); 
        }
        
        function navigateDate(direction) {
            if (state.view === 'day') state.currentDate.setDate(state.currentDate.getDate() + direction);
            else if (state.view === 'week') state.currentDate.setDate(state.currentDate.getDate() + (direction * 7));
            else if (state.view === 'month') state.currentDate.setMonth(state.currentDate.getMonth() + direction);
            else if (state.view === 'year') state.currentDate.setFullYear(state.currentDate.getFullYear() + direction);
            render();
        }

        function resetDate() { 
            state.currentDate = new Date(); 
            render({ 
                toYear: state.view === 'year',
                toWeek: state.view === 'week',
                toMonth: state.view === 'month'
            }); 
        }

        function renderDayView() {
            const container = document.getElementById('main-content');
            const dateStr = formatDate(state.currentDate);
            document.getElementById('current-date-display').innerText = `${state.currentDate.getMonth() + 1}月 ${state.currentDate.getDate()}日 (${daysOfWeek[state.currentDate.getDay()]})`;

            const dayTasks = state.tasks
                .filter(t => t.date === dateStr && (state.filter === 'all' || t.category === state.filter))
                .sort((a, b) => a.time.localeCompare(b.time));

            let html = `<div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mt-2 sm:mt-4">
                            <div class="bg-slate-50 p-3 border-b border-slate-200 font-bold text-slate-700 text-center flex justify-between items-center">
                                <span>今日行程</span>
                                <button onclick="openModal('${dateStr}')" class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1.5 sm:px-2 sm:py-1 rounded-md hover:bg-indigo-200 transition-colors active:scale-95"><i class="fa-solid fa-plus mr-1"></i>新增</button>
                            </div>
                            <div class="p-2 sm:p-4 divide-y divide-slate-100 min-h-[50vh]">`;

            if (dayTasks.length === 0) {
                html += `<div class="py-16 text-center text-slate-400 flex flex-col items-center"><i class="fa-regular fa-calendar-xmark text-5xl mb-3 text-slate-300"></i><p>今日尚無工作紀錄</p></div>`;
            } else {
                dayTasks.forEach(task => {
                    let colorClass = task.category === 'discipline' ? 'category-discipline text-blue-700' : 'category-pe text-emerald-700';
                    let icon = task.category === 'discipline' ? '<i class="fa-solid fa-shield-halved"></i>' : '<i class="fa-solid fa-volleyball"></i>';
                    
                    if (task.isImportant) {
                        colorClass = 'border-l-red-500 bg-red-50 text-red-700 font-bold';
                        icon = '<i class="fa-solid fa-triangle-exclamation"></i>';
                    }
                    
                    const completedStyle = task.completed ? 'line-through text-slate-400' : 'text-slate-800';
                    const wrapperStyle = task.completed ? 'opacity-60 grayscale' : '';

                    html += `
                        <div class="py-3 px-2 sm:px-4 flex items-start hover:bg-slate-50 transition-colors group cursor-pointer active:bg-slate-100" onclick="editTask('${task.id}')">
                            <div class="flex-1 flex flex-col gap-1 border-l-4 rounded-lg p-3 ${colorClass.split(' ')[0]} ${wrapperStyle}">
                                <div class="flex items-center gap-3">
                                    <div class="${colorClass.split(' ').slice(1).join(' ')} text-sm opacity-80">${icon}</div>
                                    <div class="font-semibold text-[15px] sm:text-base ${completedStyle}">${task.title}</div>
                                    ${task.remind ? `<i class="fa-regular fa-bell text-xs opacity-70 ml-auto"></i>` : ''}
                                </div>
                                ${(task.location || task.memo) ? `
                                <div class="pl-8 flex flex-col gap-1.5 mt-1.5 text-[13px] sm:text-sm text-slate-600 font-normal">
                                    ${task.location ? `<div class="flex items-start gap-1.5" onclick="event.stopPropagation(); window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('${task.location}'), '_blank')"><i class="fa-solid fa-location-dot mt-1 text-red-500"></i><span class="hover:text-indigo-600 hover:underline cursor-pointer break-all">${task.location}</span></div>` : ''}
                                    ${task.memo ? `<div class="flex items-start gap-1.5"><i class="fa-regular fa-note-sticky mt-1 text-slate-400"></i><span class="whitespace-pre-wrap break-all">${task.memo}</span></div>` : ''}
                                </div>` : ''}
                            </div>
                        </div>`;
                });
            }
            html += `</div></div>`;
            container.innerHTML = html;
        }

        function renderWeekView() {
            const container = document.getElementById('main-content');
            const start = getStartOfWeek(state.currentDate);
            const end = addDays(start, 6);
            document.getElementById('current-date-display').innerText = `${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}`;

            document.getElementById('modal-title').innerText = '新增工作事項';
            const now = new Date();
            document.getElementById('task-date').value = defaultDate ? defaultDate : formatDate(now);
            document.getElementById('task-time').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            document.getElementById('task-remind-toggle').checked = false;
            document.getElementById('task-completed').checked = false;
            
            document.getElementById('status-container').classList.add('hidden');
            document.getElementById('remind-options').classList.add('hidden');
            document.getElementById('modal-delete-btn').classList.add('hidden');
            document.getElementById('modal-calendar-btn').classList.add('hidden'); // 隱藏行事曆按鈕
            
            const modal = document.getElementById('task-modal');
            const content = document.getElementById('task-modal-content');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => { content.classList.remove('modal-enter'); content.classList.add('modal-enter-active'); });

        function closeModal() {
            if (document.activeElement) document.activeElement.blur();
            const modal = document.getElementById('task-modal');
            const content = document.getElementById('task-modal-content');
            
            content.classList.remove('modal-enter-active');
            content.classList.add('modal-exit-active');
            setTimeout(() => {
                modal.classList.add('hidden');
                content.classList.remove('modal-exit-active');
                content.classList.add('modal-enter');
                document.body.style.overflow = '';
                window.scrollTo(0, 0); // 強制畫面歸位
            }, 200);
        }

        function toggleRemindOptions() {
            const toggle = document.getElementById('task-remind-toggle');
            const options = document.getElementById('remind-options');
            if (toggle.checked) {
                options.classList.remove('hidden');
                // 主動請求通知權限
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();

                options.classList.add('hidden');
            }

        function editTask(id) {
            if(document.activeElement) document.activeElement.blur();
            document.body.style.overflow = 'hidden';
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;

            state.editingTaskId = id;
            document.getElementById('modal-title').innerText = '編輯工作事項';
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-location').value = task.location || '';
            document.getElementById('task-memo').value = task.memo || '';
            document.getElementById('task-date').value = task.date;
            document.getElementById('task-time').value = task.time;
            document.querySelector(`input[name="task-category"][value="${task.category}"]`).checked = true;
            document.getElementById('task-important').checked = task.isImportant || false;
            
            document.getElementById('status-container').classList.remove('hidden');
            document.getElementById('task-completed').checked = task.completed || false;

            document.getElementById('task-remind-toggle').checked = task.remind;
            toggleRemindOptions();
            if(task.remind) document.getElementById('task-remind-time').value = task.remindTime || "0";

            document.getElementById('modal-delete-btn').classList.remove('hidden');
            document.getElementById('modal-calendar-btn').classList.remove('hidden'); // 顯示行事曆按鈕

            const modal = document.getElementById('task-modal');
            const content = document.getElementById('task-modal-content');
            modal.classList.remove('hidden');
            requestAnimationFrame(() => { content.classList.remove('modal-enter'); content.classList.add('modal-enter-active'); });
        }

        async function saveTask() {
            const title = document.getElementById('task-title').value.trim();
            if (!title || !document.getElementById('task-date').value) return showToast('請填寫完整資訊', 'error');

            const taskData = {
                title, date: document.getElementById('task-date').value,
                time: document.getElementById('task-time').value,
                category: document.querySelector('input[name="task-category"]:checked').value,
                isImportant: document.getElementById('task-important').checked,
                remind: document.getElementById('task-remind-toggle').checked,
                remindTime: parseInt(document.getElementById('task-remind-time').value),
                completed: document.getElementById('task-completed').checked,
                location: document.getElementById('task-location').value.trim(),
                memo: document.getElementById('task-memo').value.trim(),
                notified: false
            };

            try {
                if (state.editingTaskId) {
                    if (window.cloudUpdateTask) await window.cloudUpdateTask(state.editingTaskId, taskData);
                    showToast('已更新工作紀錄');
                } else {
                    taskData.id = Date.now().toString();
                    if (window.cloudAddTask) await window.cloudAddTask(taskData);
                    showToast('已新增工作紀錄');
                }
                closeModal();
            } catch (error) { showToast('儲存失敗', 'error'); }
        }

            try {
                if (window.cloudDeleteTask) await window.cloudDeleteTask(id);
                showToast('已刪除工作紀錄');
                closeModal(); 
            } catch (error) { showToast('刪除失敗', 'error'); }
        }

        async function confirmDelete() { if (taskToDeleteId) { await deleteTask(taskToDeleteId); closeDeleteConfirm(); } }
        function deleteCurrentTask() { if (state.editingTaskId) openDeleteConfirm(state.editingTaskId); }
        
        // --- 新增：匯出到手機原生行事曆 (ICS) 的功能 ---
        function exportToCalendar() {
            if (!state.editingTaskId) return;
            const task = state.tasks.find(t => t.id === state.editingTaskId);
            if (!task) return;

            // 格式化日期與時間 (轉換為 iCalendar 格式 YYYYMMDDTHHMMSS)
            const startDate = task.date.replace(/-/g, '');
            let startTime = task.time ? task.time.replace(':', '') + '00' : '090000'; // 預設上午9點
            
            // 預設結束時間為開始後一小時
            const endDate = startDate;
            let endHour = parseInt(startTime.substring(0,2)) + 1;
            let endTime = String(endHour).padStart(2, '0') + startTime.substring(2);
            if (endHour >= 24) endTime = '235959'; 

            const title = (task.category === 'discipline' ? '【生教】' : '【體育】') + task.title;
            const loc = task.location || '';
            const desc = task.memo || '由組長工作紀錄系統自動建立';

            // 產生 .ics 檔案內容
            const icsData = 
                "BEGIN:VCALENDAR\n" +
                "VERSION:2.0\n" +
                "BEGIN:VEVENT\n" +
                "DTSTART:" + startDate + "T" + startTime + "\n" +
                "DTEND:" + endDate + "T" + endTime + "\n" +
                "SUMMARY:" + title + "\n" +
                "LOCATION:" + loc + "\n" +
                "DESCRIPTION:" + desc + "\n" +
                "END:VEVENT\n" +
                "END:VCALENDAR";

            // 建立下載連結觸發手機原生行為
            const blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `${task.title}.ics`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('已產生行事曆邀請，請依手機提示加入');
        }

        function openMapsFromInput() {
            const loc = document.getElementById('task-location').value.trim();
            if (loc) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
            else showToast('請先輸入地點', 'error');

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-slate-800' : 'bg-red-600';
            const icon = type === 'success' ? 'fa-check-circle text-emerald-400' : 'fa-circle-exclamation text-white';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span class="font-medium text-sm">${message}</span>`;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-x-full'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function checkReminders() {
            const now = new Date();
            const currentDateStr = formatDate(now);
            
            state.tasks.forEach(task => {
                if (task.remind && !task.notified && task.date === currentDateStr && task.time) {
                    const [taskHour, taskMin] = task.time.split(':').map(Number);
                    const taskDateObj = new Date(now.getFullYear(), now.getMonth(), now.getDate(), taskHour, taskMin);
                    
                    const timeDiffMin = Math.floor((taskDateObj - now) / 60000);

                    // 在設定的分鐘數內，且尚未過期超過5分鐘才提醒
                    if (timeDiffMin <= task.remindTime && timeDiffMin >= -5) {
                        const minText = timeDiffMin <= 0 ? '時間已到' : `${timeDiffMin} 分鐘後`;
                        const groupName = task.category === 'discipline' ? '生教組' : '體育組';
                        
                        const title = `【${groupName}提醒】${task.title}`;
                        let bodyText = `${minText}！`;
                        if (task.location) bodyText += `\n📍地點：${task.location}`;
                        if (task.memo) bodyText += `\n📝備註：${task.memo}`;

                        // 1. 手機震動 API (震動 200ms, 停 100ms, 震動 200ms)
                        if ("vibrate" in navigator) {
                            navigator.vibrate([200, 100, 200]);
                        }

                        // 2. 系統原生通知 (Web Notifications)
                        if ("Notification" in window && Notification.permission === "granted") {
                            new Notification(title, {
                                body: bodyText,
                                icon: 'https://cdn-icons-png.flaticon.com/512/3602/3602145.png' 
                            });
                        }

                        // 3. 網頁內彈出視窗雙重保險
                        showToast(`${title} (${minText})`);
                        
                        task.notified = true;
                        if (window.cloudUpdateTask) {
                            window.cloudUpdateTask(task.id, { notified: true });
                        }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setInterval(checkReminders, 30000); 
            setTimeout(checkReminders, 1000);
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjsLnijwpAYPWxDueowFaa6JaK_CafsHM",
            authDomain: "school-a81e2.firebaseapp.com",
            projectId: "school-a81e2",
            storageBucket: "school-a81e2.firebasestorage.app",
            messagingSenderId: "181296227244",
            appId: "1:181296227244:web:61294cf3b6caf569989009"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksRef = collection(db, 'tasks');

        onSnapshot(tasksRef, (snapshot) => {
            const loadedTasks = [];
            snapshot.forEach((doc) => loadedTasks.push({ id: doc.id, ...doc.data() }));
            window.updateTasksFromCloud(loadedTasks);
        }, (error) => {
            window.showToast("資料庫連線異常", "error");
            document.getElementById('loading-overlay').classList.add('hidden');
        });

        window.cloudAddTask = async (taskData) => await setDoc(doc(tasksRef, taskData.id), taskData);
        window.cloudUpdateTask = async (taskId, taskData) => await updateDoc(doc(tasksRef, taskId), taskData);
        window.cloudDeleteTask = async (taskId) => await deleteDoc(doc(tasksRef, taskId));
    </script>
